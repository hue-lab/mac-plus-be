version: '3'
services:
  backend:
    image: ghcr.io/hue-lab/mac-plus-be/image:production
    container_name: mac-plus-be
    restart: always
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TTL=${JWT_ACCESS_TTL}
      - JWT_REFRESH_TTL=${JWT_REFRESH_TTL}
      - PORT=${PORT}
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_USER=${MONGODB_USER}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_NAME=${MONGODB_NAME}
      - MONGODB_PORT=${MONGODB_PORT}
      - MONGODB_URL=mac-plus-db
      - TG_TOKEN=${TG_TOKEN}
      - TG_CHAT_ID=${TG_CHAT_ID}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - PUBLIC_FORM_REQUIRE_TOKEN=${PUBLIC_FORM_REQUIRE_TOKEN}
      - PUBLIC_FORM_ALLOWED_ORIGINS=${PUBLIC_FORM_ALLOWED_ORIGINS}
      - CORS_ORIGINS=${CORS_ORIGINS}
    volumes:
      - ./storage:/opt/app/storage
    networks:
      - node-webapp-network
  database:
    container_name: mac-plus-db
    restart: always
    image: mongo:latest
    volumes:
      - ./data:/data/db
    ports:
      - "27017:27017"
    env_file: .env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGODB_NAME}
    networks:
      - node-webapp-network
networks:
  node-webapp-network:
    driver: bridge
